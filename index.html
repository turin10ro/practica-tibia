<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formulario de Registro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h2>Registro</h2>
    <form id="registroForm">
      <div class="campo">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" placeholder="Tu nombre completo" required />
      </div>
      <div class="campo">
        <label for="edad">Edad</label>
        <input type="number" id="edad" name="edad" placeholder="Tu edad" min="1" max="120" required />
      </div>
      <div class="campo">
        <label for="telefono">Teléfono</label>
        <input type="tel" id="telefono" name="telefono" placeholder="Tu número de teléfono" required />
      </div>
      <div class="campo">
        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" name="correo" placeholder="tu@correo.com" required />
      </div>
      <button type="submit">Registrarse</button>
    </form>
  </div>
  <script src="app.js"></script>
</body>
</html>
