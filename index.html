<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">🔐</div>
      <h2>Crear cuenta</h2>
      <p class="subtitle">Ingresa tus datos para registrarte</p>
    </div>

    <form id="registroForm"></form>
      <div class="campo">
        <label for="nombre">Nombre</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input type="text" id="nombre" name="nombre" placeholder="Tu nombre completo" required />
        </div>
      </div>

      <div class="campo">
        <label for="contrasena">Contraseña</label>
        <div class="input-wrapper">
          <span class="input-icon">🔑</span>
          <input type="password" id="contrasena" name="contrasena" placeholder="Tu contraseña" required />
        </div>
      </div>

      <button type="submit">Registrarse</button>
    </form>

    <p class="footer-text">¿Ya tienes cuenta? <a href="#" style="color:#e94560;text-decoration:none;">Inicia sesión</a></p>
  </div>
  <script src="app.js"></script>
</body>
</html>
